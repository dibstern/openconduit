<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conduit — Favicon: C-shaped Bars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #18181B;
  --bg-surface: #27272A;
  --text: #E4E4E7;
  --text-secondary: #A1A1AA;
  --text-muted: #71717A;
  --text-dimmer: #52525B;
  --accent-a: #FF2D7B;
  --accent-b: #00E5FF;
  --border: #3F3F46;
  --font-display: 'Chakra Petch', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding: 48px 32px 80px;
  max-width: 1200px;
  margin: 0 auto;
}
h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
h1 .pink { color: var(--accent-a); }
h1 .cyan { color: var(--accent-b); }
.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 48px; }

.option {
  margin-bottom: 56px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 48px;
}
.option:last-child { border-bottom: none; }
.option-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.option-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dimmer);
  font-weight: 600;
  letter-spacing: 1px;
}
.option-title { font-size: 20px; font-weight: 600; }
.option-desc { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; max-width: 700px; }
.option-desc code {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-surface);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text-secondary);
}

.size-row { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
.size-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.size-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dimmer); }

.icon-frame { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.icon-frame.dark { background: var(--bg); }
.icon-frame.light { background: #F4F4F5; }

.context-row { display: flex; gap: 16px; align-items: center; }

.browser-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; margin-top: 16px; max-width: 420px;
}
.browser-bar .tab-title { font-size: 12px; color: var(--text-secondary); flex: 1; }
.browser-bar .tab-url { font-family: var(--font-mono); font-size: 11px; color: var(--text-dimmer); }

.color-legend {
  display: flex; gap: 16px; align-items: center; margin-bottom: 8px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dimmer);
}
.color-legend .swatch {
  width: 12px; height: 12px; border-radius: 2px; display: inline-block;
  margin-right: 4px; vertical-align: -2px;
}
</style>
</head>
<body>

<h1>Favicon <span class="pink">/</span> <span class="cyan">C-shaped Bars</span></h1>
<p class="subtitle">The letter "C" formed from horizontal bars in pink &amp; cyan. Each variant shown at 16px, 32px, 96px, 192px, 512px on dark &amp; light backgrounds.</p>

<div class="color-legend">
  <span><span class="swatch" style="background:#FF2D7B;"></span> Pink #FF2D7B</span>
  <span><span class="swatch" style="background:#00E5FF;"></span> Cyan #00E5FF</span>
  <span><span class="swatch" style="background:linear-gradient(90deg,#FF2D7B 50%,#00E5FF 50%);"></span> Split (both)</span>
</div>

<!-- Options will be generated by JS -->
<div id="options"></div>

<script>
const PINK = '#FF2D7B';
const CYAN = '#00E5FF';
const SIZES = [16, 32, 96, 192, 512];

// ─── C-shape bar drawing engine ─────────────────────────────────────────────
//
// Parameters:
//   rows: total number of horizontal bars
//   fullTop: how many rows at the top are full-width
//   fullBottom: how many rows at the bottom are full-width
//   armWidth: fraction of full width for the short "arm" bars (0.35-0.5)
//   splitMiddle: if odd, the exact middle row is half pink / half cyan
//   colors: array of per-row color assignments ('a'=pink, 'b'=cyan, 'split')

function roundRect(ctx, x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCBars(ctx, size, config) {
  const { rows, fullTop, fullBottom, armWidth, colors } = config;
  const padding = size * 0.1;
  const totalGap = size * 0.04 * (rows - 1);
  const availH = size - padding * 2 - totalGap;
  const barH = availH / rows;
  const gap = rows > 1 ? totalGap / (rows - 1) : 0;
  const fullW = size - padding * 2;
  const shortW = fullW * armWidth;
  const r = Math.max(0.5, Math.min(barH * 0.3, size * 0.04));

  for (let i = 0; i < rows; i++) {
    const y = padding + i * (barH + gap);
    const isFull = i < fullTop || i >= rows - fullBottom;
    const w = isFull ? fullW : shortW;
    const x = padding;
    const color = colors[i];

    if (color === 'split') {
      // Split bar: left half pink, right half cyan
      const halfW = (w - gap * 0.5) / 2;
      const splitGap = Math.max(0.5, gap * 0.6);
      ctx.fillStyle = PINK;
      roundRect(ctx, x, y, halfW, barH, r);
      ctx.fill();
      ctx.fillStyle = CYAN;
      roundRect(ctx, x + halfW + splitGap, y, halfW, barH, r);
      ctx.fill();
    } else {
      ctx.fillStyle = color === 'a' ? PINK : CYAN;
      roundRect(ctx, x, y, w, barH, r);
      ctx.fill();
    }
  }
}

// ─── Option configurations ──────────────────────────────────────────────────

const OPTIONS = [
  {
    id: 'A',
    title: '3-row C — split middle',
    desc: '3 bars forming a C. Top: pink full. Middle: split pink|cyan short arm. Bottom: cyan full. Minimal, bold, reads clearly at 16px.',
    config: {
      rows: 3, fullTop: 1, fullBottom: 1, armWidth: 0.45,
      colors: ['a', 'split', 'b']
    }
  },
  {
    id: 'B',
    title: '4-row C',
    desc: '4 bars alternating pink/cyan. Top and bottom bars full-width, two middle bars short. Classic even split.',
    config: {
      rows: 4, fullTop: 1, fullBottom: 1, armWidth: 0.42,
      colors: ['a', 'b', 'a', 'b']
    }
  },
  {
    id: 'C',
    title: '5-row C — split middle',
    desc: '5 bars with the center row split pink|cyan. Two full bars on each end, one split arm in the middle. Good balance of detail and readability.',
    config: {
      rows: 5, fullTop: 1, fullBottom: 1, armWidth: 0.42,
      colors: ['a', 'b', 'split', 'a', 'b']
    }
  },
  {
    id: 'D',
    title: '5-row C — no split',
    desc: '5 bars, pure alternation. Pink-cyan-pink-cyan-pink. No split middle — simpler color story, the C shape does the work.',
    config: {
      rows: 5, fullTop: 1, fullBottom: 1, armWidth: 0.42,
      colors: ['a', 'b', 'a', 'b', 'a']
    }
  },
  {
    id: 'E',
    title: '6-row C',
    desc: '6 bars: 2 full top, 2 short middle, 2 full bottom. More horizontal density — distinctly "barcode" feel. Reads well at 32px+, slightly dense at 16px.',
    config: {
      rows: 6, fullTop: 2, fullBottom: 2, armWidth: 0.40,
      colors: ['a', 'b', 'a', 'b', 'a', 'b']
    }
  },
  {
    id: 'F',
    title: '7-row C — split middle',
    desc: '7 bars: 2 full top, 3 short middle (center split), 2 full bottom. The richest variant — strong C letterform with visible color interplay.',
    config: {
      rows: 7, fullTop: 2, fullBottom: 2, armWidth: 0.40,
      colors: ['a', 'b', 'a', 'split', 'b', 'a', 'b']
    }
  },
  {
    id: 'G',
    title: '7-row C — no split',
    desc: '7 bars, pure alternation. Same structure as F but with a solid pink center bar instead of split. Cleaner middle section.',
    config: {
      rows: 7, fullTop: 2, fullBottom: 2, armWidth: 0.40,
      colors: ['a', 'b', 'a', 'b', 'a', 'b', 'a']
    }
  },
  {
    id: 'H',
    title: '8-row C',
    desc: '8 bars: 2 full top, 4 short middle, 2 full bottom. Maximum density — the most "data" feel. May lose clarity at 16px.',
    config: {
      rows: 8, fullTop: 2, fullBottom: 2, armWidth: 0.38,
      colors: ['a', 'b', 'a', 'b', 'a', 'b', 'a', 'b']
    }
  },
  {
    id: 'I',
    title: '5-row C — 2 full cap rows',
    desc: '5 bars: 2 full top, 1 short middle (split), 2 full bottom. Thicker caps give a chunkier, more solid C at small sizes.',
    config: {
      rows: 5, fullTop: 2, fullBottom: 2, armWidth: 0.42,
      colors: ['a', 'b', 'split', 'a', 'b']
    }
  },
  {
    id: 'J',
    title: '9-row C — split middle',
    desc: '9 bars: 3 full top, 3 short middle (center split), 3 full bottom. Maximum resolution — rich at 96px+, becomes texture at 16px.',
    config: {
      rows: 9, fullTop: 3, fullBottom: 3, armWidth: 0.38,
      colors: ['a', 'b', 'a', 'b', 'split', 'a', 'b', 'a', 'b']
    }
  },
];

// ─── Render all options ─────────────────────────────────────────────────────

const container = document.getElementById('options');

OPTIONS.forEach(opt => {
  const section = document.createElement('div');
  section.className = 'option';

  // Header
  section.innerHTML = `
    <div class="option-header">
      <span class="option-num">${opt.id}</span>
      <h2 class="option-title">${opt.title}</h2>
    </div>
    <p class="option-desc">${opt.desc}</p>
  `;

  // Size row
  const sizeRow = document.createElement('div');
  sizeRow.className = 'size-row';

  SIZES.forEach(size => {
    const item = document.createElement('div');
    item.className = 'size-item';

    const contextRow = document.createElement('div');
    contextRow.className = 'context-row';

    // Dark context
    const darkFrame = document.createElement('div');
    darkFrame.className = 'icon-frame dark';
    const darkCanvas = document.createElement('canvas');
    darkCanvas.width = size; darkCanvas.height = size;
    darkCanvas.style.width = size + 'px'; darkCanvas.style.height = size + 'px';
    darkCanvas.style.display = 'block';
    darkFrame.appendChild(darkCanvas);
    contextRow.appendChild(darkFrame);

    // Light context
    const lightFrame = document.createElement('div');
    lightFrame.className = 'icon-frame light';
    const lightCanvas = document.createElement('canvas');
    lightCanvas.width = size; lightCanvas.height = size;
    lightCanvas.style.width = size + 'px'; lightCanvas.style.height = size + 'px';
    lightCanvas.style.display = 'block';
    lightFrame.appendChild(lightCanvas);
    contextRow.appendChild(lightFrame);

    const label = document.createElement('div');
    label.className = 'size-label';
    label.textContent = size + 'px';

    item.appendChild(contextRow);
    item.appendChild(label);
    sizeRow.appendChild(item);

    drawCBars(darkCanvas.getContext('2d'), size, opt.config);
    drawCBars(lightCanvas.getContext('2d'), size, opt.config);
  });

  section.appendChild(sizeRow);

  // Browser tab mockup
  const bar = document.createElement('div');
  bar.className = 'browser-bar';
  bar.style.marginTop = '20px';

  const tabCanvas = document.createElement('canvas');
  tabCanvas.width = 16; tabCanvas.height = 16;
  tabCanvas.style.width = '16px'; tabCanvas.style.height = '16px';
  tabCanvas.style.borderRadius = '2px'; tabCanvas.style.flexShrink = '0';
  tabCanvas.style.display = 'block';
  drawCBars(tabCanvas.getContext('2d'), 16, opt.config);

  const tabTitle = document.createElement('span');
  tabTitle.className = 'tab-title';
  tabTitle.textContent = 'Conduit';

  const tabUrl = document.createElement('span');
  tabUrl.className = 'tab-url';
  tabUrl.textContent = 'localhost:2633';

  bar.appendChild(tabCanvas);
  bar.appendChild(tabTitle);
  bar.appendChild(tabUrl);
  section.appendChild(bar);

  container.appendChild(section);
});
</script>
</body>
</html>
